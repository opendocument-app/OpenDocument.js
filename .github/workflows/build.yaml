name: build

on: push

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v4
      with:
        node-version: 24
    - run: npm ci
    - run: npm run build
    - uses: actions/upload-artifact@v7
      with:
        name: build
        path: dist
